specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Voiceflow
providerId: voiceflow
created: '2026-05-08'
modified: '2026-05-08'
reconciled: partial
tags:
- AI
- Conversational
- Chat
- Voice
- Agent Builder
- Plans
description: >-
  Voiceflow uses a usage-based billing model with two purchase paths: agency/partner
  workspaces with multi-client management and white-labeling, and business/enterprise plans
  with custom contracts. Public per-conversation rate sheet is not openly listed; verify in
  workspace dashboard or with Voiceflow sales.
notes: Per-call rate sheet is not openly published; verify pricing during sales conversation.
sources:
- https://www.voiceflow.com/pricing
plans:
- id: voiceflow-trial
  name: Free Trial
  type: free
  description: Free trial without credit card; usage-based billing once activated.
  entries:
  - label: Trial
    name: trial
    type: flat
    metric: trial
    limit: 1
    timeFrame: trial
    geo: global
    unit: 1
    price: 0 USD
    userMultiplied: false
- id: voiceflow-agency
  name: Agencies and Partners
  type: subscription
  description: Multi-client workspaces with transparent usage-based billing and white-labeling.
  entries:
  - label: Workspace
    name: workspace
    type: subscription
    metric: month
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: see voiceflow.com/pricing
    userMultiplied: true
  elements:
  - name: White-labeling
  - name: Multi-client management
- id: voiceflow-business
  name: Business / Enterprise
  type: enterprise
  description: Custom enterprise pricing with implementation support and multi-channel deployment.
  entries:
  - label: Enterprise Contract
    name: enterprise
    type: flat
    metric: contract
    limit: -1
    timeFrame: annual
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: false
  elements:
  - name: Voice + chat channels
  - name: Implementation support
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
