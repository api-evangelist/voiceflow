aid: voiceflow
url: https://raw.githubusercontent.com/api-evangelist/voiceflow/refs/heads/main/apis.yml
name: Voiceflow
kind: company
description: >-
  Voiceflow is a conversational AI design and orchestration platform for building chat and
  voice agents with no-code flows, knowledge bases, and tool integrations. The Voiceflow
  Conversations API (formerly Dialog Manager API) enables programmatic interaction with
  Voiceflow agents — running turns, managing session state, and modifying conversation
  variables. Authentication via API key.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - AI
  - Conversational
  - Chat
  - Voice
  - Agent Builder
  - Dialog Manager
created: '2026-05-08'
modified: '2026-05-08'
specificationVersion: '0.19'
apis:
  - aid: voiceflow:conversations
    name: Voiceflow Conversations API
    description: >-
      REST + SSE API for running Voiceflow agent turns, managing conversation state,
      updating variables, and emitting session events. Endpoints include Interact v4
      (non-stream and SSE stream), Get/Update Conversation State, Update Conversation
      Variables, Start Session, and Emit Session Event. Base URL is
      https://general-runtime.voiceflow.com.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.voiceflow.com/reference
    baseURL: https://general-runtime.voiceflow.com
    tags:
      - Conversations
      - Dialog Manager
      - Streaming
      - Sessions
      - State
