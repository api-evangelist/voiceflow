specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Voiceflow
providerId: voiceflow
created: '2026-05-08'
modified: '2026-05-08'
reconciled: partial
tags:
- AI
- Conversational
- Chat
- Voice
- Agent Builder
- FinOps
- Cost Management
- FOCUS
description: >-
  FOCUS-aligned FinOps view of Voiceflow. Voiceflow uses transparent usage-based billing
  scaled by conversation volume. Two purchase paths exist: agency/partner workspaces with
  white-labeling, and business/enterprise contracts with implementation support and
  multi-channel deployment. Per-conversation rate sheet not openly listed.
notes: Verify per-conversation cost in workspace dashboard; LLM tokens are passed through to underlying provider.
sources:
- https://www.voiceflow.com/pricing
- https://docs.voiceflow.com/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Voiceflow
serviceCategory: AI
billingModel:
  pricingCategory: Usage-Based (Per Conversation)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Voiceflow Conversations API
  ServiceCategory: AI
  ProviderName: Voiceflow
  PublisherName: Voiceflow
  InvoiceIssuerName: Voiceflow
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
- name: conversations
  description: Conversation count.
  unit: conversation
  aggregation: sum
  dimensions:
  - account
  - workspace
  - agent
- name: workspace_seats
  description: Workspace seats / collaborators.
  unit: seat-month
  aggregation: max
  dimensions:
  - account
  - workspace
- name: llm_tokens
  description: LLM tokens consumed (provider pass-through).
  unit: token
  aggregation: sum
  dimensions:
  - account
  - model
principles:
- name: Visibility
  description: Track conversations per agent in Voiceflow workspace dashboard.
- name: Allocation
  description: Tag agents to consuming line of business / customer.
- name: Optimization
  description: Right-size agency vs business plan based on conversation volume; cap LLM token spend by tuning agent flows.
- name: Accountability
  description: Assign workspace owner per agent / customer; centralized billing on Team / Enterprise tiers.
maintainers:
