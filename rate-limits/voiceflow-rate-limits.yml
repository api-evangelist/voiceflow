specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Voiceflow
providerId: voiceflow
created: '2026-05-08'
modified: '2026-05-08'
reconciled: partial
tags:
- AI
- Conversational
- Chat
- Voice
- Agent Builder
- Rate Limiting
- Quotas
- Throttling
description: >-
  Voiceflow rate-limits primarily through plan-tier conversation quotas and concurrency
  caps. Per-RPS HTTP limits are not publicly documented; usage-based billing means
  high-volume customers should consult sales for negotiated throughput.
notes: Plan-tier conversation quotas are the documented scaling lever.
sources:
- https://www.voiceflow.com/pricing
- https://docs.voiceflow.com/
responseCodes:
  throttled: 429
limits:
- name: Conversations per Plan
  scope: account
  metric: conversations
  limit: see plan tier
- name: HTTP Requests
  scope: account
  metric: requests
  limit: not publicly documented
policies:
- name: Backoff Strategy
  description: Clients should implement exponential backoff with jitter and honor any Retry-After header.
- name: Streaming Choice
  description: Use SSE Interact endpoint for low-latency streaming responses to reduce per-request overhead.
maintainers:
